<!DOCTYPE html>
<html>
<head><title>Debug Console</title><style>body{background:#1a1a2e;color:#e2e8f0;font-family:mono;padding:20px}#logs{background:#0f0f23;border:1px solid #6366f1;border-radius:8px;padding:10px;height:300px;overflow-y:auto;font-size:12px}</style></head>
<body><h3>🐛 Debug Console</h3><div id="logs"></div><script>
const logsDiv = document.getElementById('logs');
const originalLog = console.log;
const originalWarn = console.warn;
const originalError = console.error;

function addLog(msg, type = 'log') {
    const timestamp = new Date().toLocaleTimeString();
    const color = type === 'error' ? '#ef4444' : type === 'warn' ? '#f59e0b' : '#10b981';
    const line = document.createElement('div');
    line.style.color = color;
    line.textContent = `[${timestamp}] ${msg}`;
    logsDiv.appendChild(line);
    logsDiv.scrollTop = logsDiv.scrollHeight;
}

console.log = (...args) => { addLog(args.join(' '), 'log'); originalLog(...args); };
console.warn = (...args) => { addLog(args.join(' '), 'warn'); originalWarn(...args); };
console.error = (...args) => { addLog(args.join(' '), 'error'); originalError(...args); };
</script></body></html>
