name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Copy content to _site
        run: |
          mkdir -p _site

          # 檢查 version4 是否存在，並使用 /. 複製包含隱藏檔的所有內容
          if [ -d "version4" ]; then
            echo "📁 Deploying from version4 folder"
            cp -a version4/. _site/
          else
            echo "📁 Deploying from repository root"
            cp -a . _site/
            rm -rf _site/.git _site/.github
          fi

          echo "✅ Files ready for deployment:"
          ls -la _site/ | head -15

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "_site"
 
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Summary
        run: |
          echo "=== 📄 已部署到 GitHub Pages ==="
          echo "✅ URL: ${{ steps.deployment.outputs.page_url }}"
          echo "🕐 時間: $(date -u)"